      - paragraph [ref=e16]: YOUR PRIVACY
      - heading "Privacy Policy" [level=1] [ref=e17]
      - paragraph [ref=e18]: WWJS is designed to support a private daily prayer rhythm. This policy explains what information is stored on your device, what may be processed when the app connects online, and the choices available to you.
